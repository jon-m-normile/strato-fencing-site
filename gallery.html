<div class="page-body">
  <div class="page-header"><h1 class="page-header-title">Gallery</h1></div>
  <div class="content-wrap-wide" style="padding-top:2rem; padding-bottom:2rem;">
    <div class="gallery-grid">
      <img src="homepage.jpg"  alt="Jon Normile fencing coach" onclick="openLightbox(this.src)" />
      <img src="gallery1.jpg"  alt="Jon Normile competing" onclick="openLightbox(this.src)" />
      <img src="gallery2.jpg"  alt="Jon Normile competition" onclick="openLightbox(this.src)" />
      <img src="gallery3.jpg"  alt="Jon Normile USA épée" onclick="openLightbox(this.src)" />
      <img src="gallery4.jpg"  alt="Jon Normile World Championships 2017" onclick="openLightbox(this.src)" />
      <img src="gallery5.jpg"  alt="Jon Normile early career" onclick="openLightbox(this.src)" />
      <img src="gallery6.jpg"  alt="Fencing coaching session" onclick="openLightbox(this.src)" />
      <img src="gallery7.jpg"  alt="Fencing lesson" onclick="openLightbox(this.src)" />
      <img src="gallery8.jpg"  alt="Jon Normile national championship" onclick="openLightbox(this.src)" />
      <img src="WLFY8233.JPEG" alt="Jon Normile fencing" onclick="openLightbox(this.src)" />
      <img src="normile-vs-trevor-1.jpg" alt="Jon Normile vs Trevor, 1988 National Championships" onclick="openLightbox(this.src)" />
      <img src="normile-vs-trevor-2.jpg" alt="Jon Normile vs Trevor, 1988 National Championships" onclick="openLightbox(this.src)" />

      <img src="lesson-doug-tableman.jpg" alt="Jon Normile coaching Doug Tableman" onclick="openLightbox(this.src)" />
    </div>
  </div>
</div>
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="Gallery photo" />
</div>
<footer>
  <div><div class="footer-logo">Strato <span>Fencing</span> Academy</div><div class="footer-schola">Schola Gladii Veritatis</div></div>
  <div class="footer-copy">&copy; 2025 Strato Fencing LLC &nbsp;·&nbsp; Millburn, NJ</div>
</footer>
<script>
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
</script>
