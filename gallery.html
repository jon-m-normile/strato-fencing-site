<body>

<nav>
  <a class="nav-logo" href="index.html">Strato Fencing Academy</a>

<div class="page-body">
  <div class="page-header">
    <h1 class="page-header-title">Gallery</h1>
  </div>

  <div class="content-wrap-wide">

    <!-- INSTRUCTIONS:
         Upload your photos to the images/ folder in your GitHub repo.
         Then replace each placeholder div with an <img> tag like this:
         <img src="images/your-photo-name.jpg" alt="Description" onclick="openLightbox(this.src)" />

         Add or remove items as needed to match your photos.
    -->

    <div class="gallery-grid">
      <img src="gallery1.jpg" alt="Jon Normile competing in épée" onclick="openLightbox(this.src)" />
      <img src="gallery2.jpg" alt="Jon Normile fencing competition" onclick="openLightbox(this.src)" />
      <img src="gallery3.jpg" alt="Jon Normile USA épée" onclick="openLightbox(this.src)" />
      <img src="gallery4.jpg" alt="Jon Normile Veteran World Championships 2017" onclick="openLightbox(this.src)" />
      <img src="gallery5.jpg" alt="Jon Normile early career competition" onclick="openLightbox(this.src)" />
      <img src="gallery6.jpg" alt="Fencing coaching session" onclick="openLightbox(this.src)" />
      <img src="gallery7.jpg" alt="Fencing lesson in salle" onclick="openLightbox(this.src)" />
      <img src="gallery8.jpg" alt="Jon Normile national championship" onclick="openLightbox(this.src)" />
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="Gallery photo" />
</div>

<footer>
  <div class="footer-logo">Strato Fencing Academy</div>
  <div class="footer-copy">&copy; 2025 Jon Normile &nbsp;·&nbsp; Millburn, NJ</div>
</footer>

<script>
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

</body>
</html>
